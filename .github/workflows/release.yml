name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          install: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      # Server Image
      - name: Build & Push Server Image
        uses: docker/build-push-action@v7
        with:
          context: ./Server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-code-reviewer-server:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-code-reviewer-server:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Client Image
      - name: Build & Push Client Image
        uses: docker/build-push-action@v7
        with:
          context: ./Client
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-code-reviewer-client:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-code-reviewer-client:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trigger Render Deployment
        run: |
          curl --fail --silent --show-error \
            -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK }}"

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: Client

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Project
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
