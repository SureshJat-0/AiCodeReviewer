name: Server CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: server-ci
  cancel-in-progress: true

jobs:
  server-ci:
    name: CI Pipeline for Server
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Server/package-lock.json

      - name: Install Dependencies
        run: npm ci
